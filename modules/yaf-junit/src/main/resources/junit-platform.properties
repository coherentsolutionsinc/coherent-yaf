# Enable parallel execution
junit.jupiter.execution.parallel.enabled=true
# ENABLE auto-detection of extensions from META-INF/services
junit.jupiter.extensions.autodetection.enabled=true
# Configure the execution mode
junit.jupiter.execution.parallel.mode.default=same_thread
#concurrent
junit.jupiter.execution.parallel.mode.classes.default=concurrent
#junit.jupiter.execution.parallel.config.strategy=fixed
#junit.jupiter.execution.parallel.config.fixed.parallelism=4
junit.jupiter.testinstance.lifecycle.default=per_class

# NOTE: Using PostDiscoveryFilter to remove @Variants tests from Jupiter
# VariantsPostDiscoveryFilter removes @Variants classes from Jupiter's test tree
# after discovery but before execution - works in all environments

